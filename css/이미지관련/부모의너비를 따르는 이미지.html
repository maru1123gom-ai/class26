<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부모의너비를 따르는 이미지</title>
  <style>
    *{margin:0; padding:0;}
    .wrap{margin:30px;}
    .img-wrap{
      /* width:auto; */
      background-color: #f00;
    }
    /* 부모의 너비랑 상관없이 이미지는 항상 부모의 너비를 따라서 자동 조절 */
    .img-wrap img{
      width:100%;
      /* height: auto;  이미지의 가로세로 비율을 유지*/
      display: block;
      opacity: 0.5;/*텍스트 삭제*/
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="img-wrap">
      <img src="../images/smartbanner-01-01-pc.png" alt="원피스 할인 이벤트">
    </div>
  </div>
</body>
</html>
